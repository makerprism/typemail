<!-- Paragraph Component Golden Tests -->

<!-- Basic paragraph -->
<p>This is a paragraph of text.</p>

<!-- Paragraph with inline style (correct cross-client approach) -->
<p style="color: #6b7280;">This is gray text.</p>

<!-- Paragraph with brand color -->
<p style="color: #4f46e5;">Brand indigo text</p>

<!-- Paragraph with custom color -->
<p style="color: #ff0000;">Red warning text</p>

<!-- Rich text paragraph with bold -->
<p>Join <strong>Team</strong>!</p>

<!-- Rich text paragraph with link -->
<p>Visit <a href="https://example.com">our site</a> for more info.</p>

<!-- Rich text paragraph with italic -->
<p>This is <em>emphasized</em> text.</p>

<!-- Rich text paragraph with code -->
<p>Use <code style="background-color: #f3f4f6; padding: 2px 4px; border-radius: 3px; font-family: monospace;">npm install</code> to get started.</p>

<!-- Rich text paragraph with colored span -->
<p>This is <span style="color: #ff0000;">red text</span> in a paragraph.</p>

<!-- Rich text paragraph with multiple formattings -->
<p>Join <strong>Team</strong> <a href="https://example.com">now</a>!</p>
