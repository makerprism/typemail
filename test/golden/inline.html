<!-- Inline Component Golden Tests -->

<!-- Plain text -->
Hello world

<!-- Bold text -->
<strong>Bold text</strong>

<!-- Italic text -->
<em>Italic text</em>

<!-- Underline text -->
<u>Underline text</u>

<!-- Bold + italic -->
<strong><em>Bold and italic</em></strong>

<!-- Link -->
<a href="https://example.com">Click here</a>

<!-- Bold link (styled CTA) -->
<a href="https://example.com"><strong>Get Started</strong></a>

<!-- Concatenated inline elements -->
Hello <strong>world</strong>! <a href="https://example.com">Click here</a>

<!-- Paragraph with inline content -->
<p>Welcome <strong>new user</strong>! Please <a href="https://example.com/settings">visit your settings</a>.</p>

<!-- Heading with inline content -->
<h1>Welcome to <strong>typemail</strong></h1>

<!-- Styled paragraph with inline content -->
<p style="color: #6b7280; font-size: 14px;">This is <em>styled</em> rich text.</p>

<!-- Styled heading with inline content -->
<h2 style="color: #4f46e5; text-align: center;">You're <em>invited</em>!</h2>

<!-- HTML escaping test -->
&lt;script&gt;alert(&#39;xss&#39;)&lt;/script&gt;
